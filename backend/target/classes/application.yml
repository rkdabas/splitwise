server:
  port: 8080

spring:
  application:
    name: splitwise-backend
  datasource:
    url: jdbc:sqlite:data/splitwise.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.format_sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:splitwise-jwt-secret-key-min-256-bits-for-hs256-please-change-in-production}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.splitwise: INFO
    org.springframework.web: INFO
